name: CI/CD — IA Immobiliere

on:
  push:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - run: pytest test_api.py -v

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region eu-west-3 | docker login \
            --username AWS \
            --password-stdin 718100329950.dkr.ecr.eu-west-3.amazonaws.com

      - name: Build and push to ECR
        run: |
          docker build -t ia-immobiliere .
          docker tag ia-immobiliere:latest 718100329950.dkr.ecr.eu-west-3.amazonaws.com/ia-immobiliere:latest
          docker push 718100329950.dkr.ecr.eu-west-3.amazonaws.com/ia-immobiliere:latest

      - name: Deploy sur EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. On dégage tout proprement
            docker stop ia-immo || true
            docker rm ia-immo || true
            docker system prune -af

            # 2. Login ECR
            aws ecr get-login-password --region eu-west-3 | docker login --username AWS --password-stdin 718100329950.dkr.ecr.eu-west-3.amazonaws.com

            # 3. On tire l'image
            docker pull 718100329950.dkr.ecr.eu-west-3.amazonaws.com/ia-immobiliere:latest

            # 4. ASTUCE : On donne un nom local court à l'image qu'on vient de pull
            docker tag 718100329950.dkr.ecr.eu-west-3.amazonaws.com/ia-immobiliere:latest ia-immo-local

            # 5. On lance le run sur le nom local (Docker ne peut pas le rater)
            docker run -d -p 8001:8000 --name ia-immo \
              -e DB_HOST=${{ secrets.DB_HOST }} \
              -e DB_USER=${{ secrets.DB_USER }} \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e DB_NAME=${{ secrets.DB_NAME }} \
              -e DB_PORT=${{ secrets.DB_PORT }} \
              ia-immo-local
            